name: Release Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release-readiness:
    name: Release Readiness (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release readiness checks
        run: npm run release:check:ci

      - name: Upload release readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-${{ matrix.os }}
          path: |
            artifacts/release-readiness.json
            artifacts/release-readiness.md
          if-no-files-found: warn
