name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-blocking:
    name: Release Blocking (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - blacksmith-4vcpu-windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build bundles
        run: npm run bundle

      - name: Run release-blocking suite
        run: npm run test:release-blocking
